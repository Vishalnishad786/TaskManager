services:
  # Backend API Service
  - type: web
    name: taskmanager-backend
    runtime: node
    repo: https://github.com/Vishalnishad786/TaskManager
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskmanager-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: taskmanager-frontend
    runtime: static
    repo: https://github.com/Vishalnishad786/TaskManager
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://taskmanager-backend.onrender.com/api
      - key: CI
        value: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    autoDeploy: true

# PostgreSQL Database
databases:
  - name: taskmanager-db
    plan: free